<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>D3 Chart</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<h2>D3 Bar Chart</h2>

<svg width="500" height="300"></svg>

<script>
const data = [10, 20, 30, 40, 50];

const svg = d3.select("svg");

svg.selectAll("rect")
  .data(data)
  .enter()
  .append("rect")
  .attr("x", (d, i) => i * 60)
  .attr("y", d => 300 - d * 5)
  .attr("width", 40)
  .attr("height", d => d * 5)
  .attr("fill", "steelblue");
</script>

</body>
</html>
