<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markers With Custom Icons</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    h1 { text-align: center; margin: 12px 0; }
    #map { width: 100%; height: 85vh; }
  </style>
</head>
<body>
  <h1>Markers With Custom Icons</h1>
  <div id="map"></div>

  <script>
    const map = L.map('map').setView([30.6187, -96.3365], 16);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const customIcon = L.icon({
      iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
      iconSize: [32, 32],
      iconAnchor: [16, 32],
      popupAnchor: [0, -32]
    });

    L.marker([30.6187, -96.3365], { icon: customIcon }).addTo(map)
      .bindPopup('Custom icon marker at Kyle Field')
      .openPopup();

    L.marker([30.6175, -96.3380], { icon: customIcon }).addTo(map)
      .bindPopup('Another custom icon marker');
  </script>
</body>
</html>
