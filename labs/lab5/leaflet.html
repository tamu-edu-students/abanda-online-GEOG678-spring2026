<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaflet Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    h1 {
      text-align: center;
      margin: 12px 0;
    }
    #map {
      width: 100%;
      height: 85vh;
    }
  </style>
</head>
<body>
  <h1>Leaflet Map</h1>
  <div id="map"></div>

  <script>
    const map = L.map('map').setView([30.6187, -96.3365], 16);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

L.marker([30.6187, -96.3365]).addTo(map)
  .bindPopup('Texas A&M Campus')
  .openPopup();
  </script>
</body>
</html>
